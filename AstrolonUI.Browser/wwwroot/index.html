<!DOCTYPE html>
<html class="theme-dark">
<head>
    <title>AstrolonUI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./app.css" />
    <link rel="stylesheet" href="./lib/katex.min.css">
    <link rel="stylesheet" href="./lib/github.min.css">
    <link rel="stylesheet" href="/web/renderer.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #out { display: block; width: 100vw; height: 100vh; }
        /* Markdown 预览面板（左下角，对应 Agent 对话区域） */
        #sidebar {
            display: none;
        }
        #preview {
            display: none;
            position: fixed; bottom: 0; left: 0;
            width: 360px; max-height: 45vh; overflow-y: auto;
            background: rgba(30, 30, 30, 0.93);
            border-right: 1px solid #555; border-top: 1px solid #555;
            padding: 8px 12px; z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            font-size: 12px; line-height: 1.5; color: #d4d4d4;
            box-shadow: 4px -4px 16px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        #preview * {
            pointer-events: auto;
        }
        #preview h1 { font-size: 14px; margin: 6px 0; }
        #preview h2 { font-size: 13px; margin: 4px 0; }
        #preview code { font-size: 11px; }
        #preview-sidebar-header, #preview-sidebar { display: none; }
    </style>
</head>
<body>
    <div id="out">
        <div class="avalonia-splash">
            <h2><a href="https://www.avaloniaui.net/" target="_blank">
                <img fill="none" xmlns="http://www.w3.org/2000/svg"
                     src="./company-logo.ico" alt="Avalonia" />
            </a></h2>
        </div>
    </div>
    <!-- Markdown 预览（左下角浮动，对应 Agent 对话区域） -->
    <div id="preview"></div>

    <!-- 本地库（替代 CDN，避免 Tracking Prevention 阻止） -->
    <script src="./lib/markdown-it.min.js"></script>
    <script src="./lib/markdown-it-footnote.min.js"></script>
    <script src="./lib/markdown-it-task-lists.min.js"></script>
    <script src="./lib/highlight.min.js"></script>
    <script src="./lib/katex.min.js"></script>
    <script src="./lib/mermaid.min.js"></script>
    <script src="/web/renderer.js"></script>
    <script type='module' src="./main.js"></script>
</body>
</html>
